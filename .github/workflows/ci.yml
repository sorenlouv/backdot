name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump for a manual release. Merges to main always publish a patch; use this to cut a minor or major."
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Least privilege by default. The publish job opts into more below.
permissions:
  contents: read

# Husky git hooks are a local-dev convenience and must not run in CI: otherwise
# the release job's "npm version" commit triggers pre-commit, and its "git push"
# triggers pre-push (which runs the whole test suite and fails the push).
env:
  HUSKY: "0"

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      GIT_AUTHOR_NAME: ci
      GIT_AUTHOR_EMAIL: ci@backdot.dev
      GIT_COMMITTER_NAME: ci
      GIT_COMMITTER_EMAIL: ci@backdot.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run fmt:check
      - run: npm run build
      - run: npm test
      - run: npm run test:integration
      - run: npm run test:e2e

  # Publishes a new version to npm on every merge to main (patch bump), or a
  # minor/major when triggered manually via "Run workflow". Authenticates to npm
  # with OIDC trusted publishing — no NPM_TOKEN is stored anywhere.
  publish:
    needs: check
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    # Never let two releases run at once (avoids version/publish races).
    concurrency:
      group: publish-npm
      cancel-in-progress: false

    permissions:
      contents: write # push the version-bump commit + tag and create the release
      id-token: write # mint the OIDC token for npm trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # stay on the branch (not a detached HEAD) so we can commit + push
          fetch-depth: 0 # full history + tags so release notes are generated correctly

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org" # pins the registry for the OIDC token exchange
          cache: npm

      # OIDC trusted publishing needs npm >= 11.5.1, which is newer than the npm
      # bundled with Node, so upgrade before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump package.json + package-lock.json only. We use --no-git-tag-version
      # and make the commit + tag ourselves below, so we control the commit
      # message ("[skip ci]") and exactly what gets staged.
      - name: Bump version
        id: version
        run: |
          npm version "${{ inputs.release_type || 'patch' }}" --no-git-tag-version
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Commit, tag, and push BEFORE publishing. If this push fails, nothing has
      # been published yet, so re-running the job recovers cleanly. "[skip ci]"
      # plus the GITHUB_TOKEN recursion guard keep the bump commit from
      # re-triggering the workflow.
      - name: Commit, tag, and push
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push --follow-tags origin "HEAD:${{ github.ref_name }}"

      # No --provenance flag and no token needed: under trusted publishing,
      # npm authenticates via OIDC and attaches provenance automatically.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
