name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      GIT_AUTHOR_NAME: ci
      GIT_AUTHOR_EMAIL: ci@backdot.dev
      GIT_COMMITTER_NAME: ci
      GIT_COMMITTER_EMAIL: ci@backdot.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - run: npm ci
        working-directory: cli
      - run: npm run lint
        working-directory: cli
      - run: npm run fmt:check
        working-directory: cli
      - run: npm run build
        working-directory: cli
      - run: npm test
        working-directory: cli
      - run: npm run test:integration
        working-directory: cli
      - run: npm run test:e2e
        working-directory: cli
